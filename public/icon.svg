<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- SMART CITY logomark — "הצלם והפין-עינית":
       a kid raises a phone; the map pin above IS the camera viewfinder,
       with a crosswalk caught inside. Redrawn clean as vector
       (concept 1 from the brand board, chosen by Ariel). -->
  <rect width="512" height="512" fill="#020509"/>
  <g fill="none" stroke="#35E1FF" stroke-linecap="round" stroke-linejoin="round">
    <!-- the pin / viewfinder -->
    <path stroke-width="15" d="M310 52c-70 0-120 51-120 111 0 44 27 76 60 106 24 22 44 44 60 76 16-32 36-54 60-76 33-30 60-62 60-106 0-60-50-111-120-111Z"/>
    <!-- viewfinder corner ticks -->
    <g stroke-width="11">
      <path d="M246 122v-20h20M374 102h20v20M394 200v20h-20M266 220h-20v-20"/>
    </g>
    <!-- the crosswalk caught in frame (perspective fan) -->
    <g stroke-width="11">
      <path d="M272 196l-8-44"/>
      <path d="M303 196l-2-48"/>
      <path d="M334 196l4-48"/>
      <path d="M363 196l10-44"/>
    </g>
    <!-- the photographer: head + bust + raised arm -->
    <circle cx="148" cy="316" r="36" stroke-width="13"/>
    <path stroke-width="13" d="M92 512c3-84 14-124 56-142"/>
    <path stroke-width="13" d="M172 344c34-8 56-18 76-32"/>
    <!-- the phone, aimed at the pin's tip -->
    <rect x="248" y="286" width="38" height="62" rx="6" stroke-width="11"/>
  </g>
  <!-- gold shutter — the moment of capture -->
  <circle cx="267" cy="304" r="9" fill="#FFB627"/>
</svg>
